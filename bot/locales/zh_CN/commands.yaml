# Slash command metadata (zh_CN) — P1-7
#
# Structure: <cog>.<command_or_group>[.params.<name>].description
# - description: command description shown in the client's command picker
# - params.<name>: describe() text for that parameter
#
# Command *names* are NOT localized (Discord slash `name` restricts to
# ascii lower / digits / `_` / `-`). Only `description` / `params` are.
#
# Non-zh-CN clients see the English fallback inside
# `locale_str("...", key=...)` in each cog decorator; this file is loaded
# only when Discord asks for the zh-CN locale (via SlashTranslator).

achievements:
  achievements:
    description: "查询成就进度"
    params:
      member: "要查询的成员（默认为自己）"
      date: "可选月份，格式 YYYY-MM（例如 2024-07）"
  increase_achievement:
    description: "增加成员的成就进度（管理员）"
    params:
      member: "要增加进度的成员"
      reactions: "要增加的反应次数"
      messages: "要增加的消息数"
      time_spent: "要增加的语音时长（秒）"
      giveaways: "要增加的抽奖次数"
  decrease_achievement:
    description: "减少成员的成就进度（管理员）"
    params:
      member: "要减少进度的成员"
      reactions: "要减少的反应次数"
      messages: "要减少的消息数"
      time_spent: "要减少的语音时长（秒）"
      giveaways: "要减少的抽奖次数"
  achievement_ranking:
    description: "显示成就排行榜"
    params:
      date: "可选月份，格式 YYYY-MM（例如 2024-07）"
  check_ach_ops:
    description: "查看成就手动调整的操作记录"
  rank:
    description: "以交互形式查看成就排行榜"
    params:
      date: "可选月份，格式 YYYY-MM（例如 2024-07）"

